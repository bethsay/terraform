apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: EKSAutoMode
  region: us-east-1
  version: "1.35"

autoModeConfig:
  enabled: true
  nodePools: []         # Default value is [system, general-purpose]. They cannot be deleted or modified, only disabled.
                        # We cannot use them while in free tier as they include c, m and r type instances
                        # Once eksctl cluster create is done, run "kubectl apply -f 01a-nodepool.yaml"
